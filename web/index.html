<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Cadastro de Pet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">
        <h2>Cadastro de Pet</h2>

        <form action="valida.jsp" method="post">

            <div class="form-group">
                <label for="nomeAnimal">Nome do Animal</label>
                <input type="text" id="nomeAnimal" name="nomeAnimal" required>
            </div>

            <div class="form-group">
                <label for="especie">Espécie</label>
                <input type="text" id="especie" name="especie" placeholder="Ex: Cachorro, Gato, Pássaro" required>
            </div>

            <div class="form-group">
                <label for="raca">Raça</label>
                <input type="text" id="raca" name="raca" required>
            </div>

            <div class="form-group">
                <label for="tutorNome">Nome do Tutor</label>
                <input type="text" id="tutorNome" name="tutorNome" required>
            </div>

            <div class="form-group">
                <label for="tutorEmail">Email do Tutor</label>
                <input type="email" id="tutorEmail" name="tutorEmail" required>
            </div>

            <div class="form-group">
                <label for="porte">Porte</label>
                <input type="text" id="porte" name="porte" placeholder="Ex: Pequeno, Médio, Grande">
            </div>

            <div class="form-group">
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" name="peso" step="0.1">
            </div>

            <div class="form-actions">
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Limpar">
            </div>

        </form>

        <div class="actions">
            <a href="listar.jsp">
                <button type="button">Ver Pets</button>
            </a>
        </div>

    </main>

</body>
</html>
