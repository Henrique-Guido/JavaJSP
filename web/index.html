<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Membro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">
        <h2>Cadastro de Membro</h2>

        <form action="valida.jsp" method="post">

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" required>
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <input type="text" id="estado" name="estado" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="categoria">Categoria</label>
                <input type="text" id="categoria" name="categoria" placeholder="Ex: profissional">
            </div>

            <div class="form-group">
                <label for="rank">Rank</label>
                <input type="number" id="rank" name="rank">
            </div>

            <div class="form-actions">
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Limpar">
            </div>

        </form>

        <div class="actions">
            <a href="listar.jsp">
                <button type="button">Membros</button>
            </a>
        </div>

    </main>

</body>
</html>
