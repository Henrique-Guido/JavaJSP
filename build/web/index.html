<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas - Nova Tarefa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">
        <h2>Nova Tarefa</h2>

        <form action="valida.jsp" method="post">

            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" name="titulo" required>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" name="descricao" placeholder="Descreva a tarefa">
            </div>

            <div class="form-group">
                <label for="prioridade">Prioridade</label>
                <select id="prioridade" name="prioridade">
                    <option value="Baixa">Baixa</option>
                    <option value="Média" selected>Média</option>
                    <option value="Alta">Alta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="Pendente" selected>Pendente</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Concluída">Concluída</option>
                </select>
            </div>

            <div class="form-group">
                <label for="prazo">Prazo</label>
                <input type="date" id="prazo" name="prazo">
            </div>

            <div class="form-group">
                <label for="responsavel">Responsável</label>
                <input type="text" id="responsavel" name="responsavel" required>
            </div>

            <div class="form-actions">
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Limpar">
            </div>

        </form>

        <div class="actions">
            <a href="listar.jsp">
                <button type="button">Ver Tarefas</button>
            </a>
        </div>

    </main>

</body>
</html>
